<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RadarCoisas</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 220px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #16a34a;
}

.hidden { display: none; }

a {
  color: #38bdf8;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h1>🧭 RadarCoisas</h1>
<p id="pergunta"></p>

<div id="opcoes"></div>

<div id="resultado" class="hidden">
  <h2>Seu radar encontrou isso 👇</h2>
  <div id="produtos"></div>
</div>

<script>
let etapa = 0;
let respostas = {};

const perguntas = [
  {
    texto: "O que você quer encontrar?",
    opcoes: ["Tecnologia", "Casa", "Presentes", "Aleatório"]
  },
  {
    texto: "Qual faixa de preço?",
    opcoes: ["Barato", "Médio", "Tanto faz"]
  },
  {
    texto: "Para quem é?",
    opcoes: ["Para mim", "Presente", "Tanto faz"]
  },
  {
    texto: "Você prefere algo...",
    opcoes: ["Útil", "Criativo", "Diferente"]
  }
];

const produtos = [
  {nome:"Mini projetor portátil", categoria:"Tecnologia", link:"https://meli.la/1upXvCz"},
  {nome:"Fone Bluetooth", categoria:"Tecnologia", link:"https://meli.la/1pLsuAP"},
  {nome:"Caixa de som portátil", categoria:"Tecnologia", link:"https://meli.la/2ZwGSZq"},

  {nome:"Lâmpada LED inteligente", categoria:"Casa", link:"https://meli.la/2Whi2mJ"},
  {nome:"Organizador multiuso", categoria:"Casa", link:"https://meli.la/2m3EDWh"},
  {nome:"Suporte de celular", categoria:"Casa", link:"https://meli.la/2YF8qDJ"},
  {nome:"Relógio digital LED", categoria:"Casa", link:"https://meli.la/24rpcs3"},

  {nome:"Caneca criativa", categoria:"Presentes", link:"https://meli.la/24rpcs3"}
];

function mostrarPergunta(){
  if(etapa >= perguntas.length){
    mostrarResultado();
    return;
  }

  document.getElementById("pergunta").innerText = perguntas[etapa].texto;

  const opcoesDiv = document.getElementById("opcoes");
  opcoesDiv.innerHTML = "";

  perguntas[etapa].opcoes.forEach(op => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => responder(op);
    opcoesDiv.appendChild(btn);
  });
}

function responder(resposta){
  respostas["p"+etapa] = resposta;
  etapa++;
  mostrarPergunta();
}

function mostrarResultado(){
  document.getElementById("pergunta").classList.add("hidden");
  document.getElementById("opcoes").classList.add("hidden");
  document.getElementById("resultado").classList.remove("hidden");

  let categoria = respostas.p0;

  let filtrados = produtos.filter(p => 
    categoria === "Aleatório" || p.categoria === categoria
  );

  let html = "";

  filtrados.slice(0,5).forEach(p => {
    html += `
      <p>
        <strong>${p.nome}</strong><br>
        <a href="${p.link}" target="_blank">Ver produto</a>
      </p>
    `;
  });

  document.getElementById("produtos").innerHTML = html;
}

mostrarPergunta();
</script>

</body>
</html>
