<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadarCoisas</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  text-align: center;
  padding: 15px;
}

h1 {
  font-size: 30px;
  margin-bottom: 5px;
}

#pergunta {
  font-size: 22px;
  margin: 25px 0;
}

button {
  display: block;
  margin: 12px auto;
  padding: 16px;
  width: 90%;
  max-width: 320px;
  border: none;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  border-radius: 14px;
  cursor: pointer;
  font-size: 17px;
  font-weight: bold;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.hidden {
  display: none;
}

#resultado h2 {
  font-size: 24px;
}

#produtos p {
  background: #1e293b;
  padding: 18px;
  border-radius: 14px;
  margin: 15px auto;
  max-width: 340px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

a {
  color: #38bdf8;
  font-weight: bold;
  display: inline-block;
  margin-top: 10px;
  font-size: 15px;
}

#loading {
  font-size: 22px;
  margin-top: 40px;
}
</style>
</head>

<body>

<h1>🧭 RadarCoisas</h1>
<p id="pergunta"></p>

<div id="opcoes"></div>

<div id="loading" class="hidden">
  🔎 Analisando seu perfil...
</div>

<div id="resultado" class="hidden">
  <h2>Seu radar encontrou isso 👇</h2>
  <div id="produtos"></div>
</div>

<script>
let etapa = 0;
let respostas = {};

const perguntas = [
  {texto: "O que você quer encontrar?", opcoes: ["Tecnologia", "Casa", "Presentes", "Aleatório"]},
  {texto: "Qual faixa de preço?", opcoes: ["Barato", "Médio", "Tanto faz"]},
  {texto: "Para quem é?", opcoes: ["Para mim", "Presente", "Tanto faz"]},
  {texto: "Você prefere algo...", opcoes: ["Útil", "Criativo", "Diferente"]}
];

const produtos = [
  {nome:"Mini projetor portátil", categoria:"Tecnologia", link:"https://meli.la/1upXvCz"},
  {nome:"Fone Bluetooth", categoria:"Tecnologia", link:"https://meli.la/1pLsuAP"},
  {nome:"Caixa de som portátil", categoria:"Tecnologia", link:"https://meli.la/2ZwGSZq"},

  {nome:"Lâmpada LED inteligente", categoria:"Casa", link:"https://meli.la/2Whi2mJ"},
  {nome:"Organizador multiuso", categoria:"Casa", link:"https://meli.la/2m3EDWh"},
  {nome:"Suporte de celular", categoria:"Casa", link:"https://meli.la/2YF8qDJ"},
  {nome:"Relógio digital LED", categoria:"Casa", link:"https://meli.la/24rpcs3"},

  {nome:"Caneca criativa", categoria:"Presentes", link:"https://meli.la/24rpcs3"}
];

function mostrarPergunta(){
  if(etapa >= perguntas.length){
    mostrarLoading();
    return;
  }

  document.getElementById("pergunta").innerText = perguntas[etapa].texto;

  const opcoesDiv = document.getElementById("opcoes");
  opcoesDiv.innerHTML = "";

  perguntas[etapa].opcoes.forEach(op => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => responder(op);
    opcoesDiv.appendChild(btn);
  });
}

function responder(resposta){
  respostas["p"+etapa] = resposta;
  etapa++;
  mostrarPergunta();
}

function mostrarLoading(){
  document.getElementById("pergunta").classList.add("hidden");
  document.getElementById("opcoes").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");

  setTimeout(mostrarResultado, 1500);
}

function mostrarResultado(){
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("resultado").classList.remove("hidden");

  let categoria = respostas.p0;

  let filtrados = produtos.filter(p => 
    categoria === "Aleatório" || p.categoria === categoria
  );

  let html = "";

  filtrados.slice(0,5).forEach(p => {
    html += `
      <p>
        <strong>${p.nome}</strong><br>
        <a href="${p.link}" target="_blank">Ver produto</a>
      </p>
    `;
  });

  document.getElementById("produtos").innerHTML = html;
}

mostrarPergunta();
</script>

</body>
</html>
