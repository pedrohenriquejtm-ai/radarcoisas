<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>RadarCoisas</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 12px;
  width: 200px;
  border: none;
  background: #22c55e;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.hidden { display: none; }
</style>
</head>

<body>

<h1>🧭 RadarCoisas</h1>
<p id="pergunta"></p>

<div id="opcoes"></div>

<div id="resultado" class="hidden">
  <h2>Seu radar encontrou isso 👇</h2>
  <div id="produtos"></div>
</div>

<script>
let etapa = 0;
let respostas = {};

const perguntas = [
  {
    texto: "O que você quer encontrar?",
    opcoes: ["Tecnologia", "Casa", "Presentes", "Aleatório"]
  },
  {
    texto: "Faixa de preço?",
    opcoes: ["Barato", "Médio", "Tanto faz"]
  },
  {
    texto: "Para quem é?",
    opcoes: ["Para mim", "Presente", "Tanto faz"]
  },
  {
    texto: "Estilo?",
    opcoes: ["Útil", "Criativo", "Diferente"]
  }
];

const produtos = [
  {nome:"Mini projetor portátil", categoria:"Tecnologia", link:"#"},
  {nome:"Fone Bluetooth", categoria:"Tecnologia", link:"#"},
  {nome:"Lâmpada LED inteligente", categoria:"Casa", link:"#"},
  {nome:"Organizador multiuso", categoria:"Casa", link:"#"},
  {nome:"Caneca mágica", categoria:"Presentes", link:"#"},
  {nome:"Caixa de som portátil", categoria:"Tecnologia", link:"#"},
  {nome:"Suporte de celular", categoria:"Casa", link:"#"},
  {nome:"Relógio digital LED", categoria:"Casa", link:"#"}
];

function mostrarPergunta(){
  if(etapa >= perguntas.length){
    mostrarResultado();
    return;
  }

  document.getElementById("pergunta").innerText = perguntas[etapa].texto;

  const opcoesDiv = document.getElementById("opcoes");
  opcoesDiv.innerHTML = "";

  perguntas[etapa].opcoes.forEach(op => {
    const btn = document.createElement("button");
    btn.innerText = op;
    btn.onclick = () => responder(op);
    opcoesDiv.appendChild(btn);
  });
}

function responder(resposta){
  respostas["p"+etapa] = resposta;
  etapa++;
  mostrarPergunta();
}

function mostrarResultado(){
  document.getElementById("pergunta").classList.add("hidden");
  document.getElementById("opcoes").classList.add("hidden");
  document.getElementById("resultado").classList.remove("hidden");

  let categoria = respostas.p0;

  let filtrados = produtos.filter(p => 
    categoria === "Aleatório" || p.categoria === categoria
  );

  let html = "";

  filtrados.slice(0,5).forEach(p => {
    html += `
      <p>
        <strong>${p.nome}</strong><br>
        <a href="${p.link}" target="_blank">Ver produto</a>
      </p>
    `;
  });

  document.getElementById("produtos").innerHTML = html;
}

mostrarPergunta();
</script>

</body>
</html>
